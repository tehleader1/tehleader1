name: Keep Render Alive

on:
  schedule:
    # Every 14 minutes — Render sleeps after 15min of inactivity
    - cron: '*/14 * * * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Aria
        run: |
          echo "Pinging aria.supportrd.com..."
          curl -s -o /dev/null -w "Status: %{http_code}" https://aria.supportrd.com/api/ping
          echo ""
          echo "Render is awake."
