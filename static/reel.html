<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SupportRD TV Reel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(1200px 600px at 20% 20%, rgba(116,224,184,0.25), transparent 60%),
      radial-gradient(900px 500px at 80% 30%, rgba(255,214,153,0.22), transparent 60%),
      linear-gradient(135deg, #0d1412 0%, #0b1a14 40%, #111c26 100%);
    color:#fff;
    font-family:'DM Sans', sans-serif;
  }
  .reel-wrap{
    width:min(980px, 92vw);
    display:grid;
    gap:14px;
  }
  .reel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 16px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.35);
  }
  .reel-title{
    font-size:18px;
    font-weight:700;
  }
  .reel-sub{
    font-size:12px;
    color:rgba(255,255,255,0.7);
  }
  .reel-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .chip{
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:#fff;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
  }
  .chip.active{
    background:linear-gradient(120deg, rgba(47,230,200,0.75), rgba(58,125,255,0.75));
    color:#0b0f14;
    border-color:transparent;
  }
  .chip.secondary{
    border-style:dashed;
    opacity:0.9;
  }
  .reel-frame{
    width:100%;
    height:62vh;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.16);
    background:#000;
  }
  .reel-foot{
    font-family:'Space Mono', monospace;
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.6);
    text-align:center;
  }
  .reel-status{
    font-size:11px;
    color:rgba(255,255,255,0.65);
  }
  @media (max-width:700px){
    .reel-frame{height:52vh;}
    .reel-head{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>
  <div class="reel-wrap">
    <div class="reel-head">
      <div>
        <div class="reel-title">SupportRD TV Reel</div>
        <div class="reel-sub">Internet Archive stream · curated hair + millionaire/business clips.</div>
        <div class="reel-status" id="reelStatus">Loading archive feed…</div>
      </div>
      <div class="reel-actions">
        <button class="chip active" data-topic="hair">Hair Growth</button>
        <button class="chip" data-topic="haircare">Hair Care</button>
        <button class="chip" data-topic="millionaire">Millionaire Mindset</button>
        <button class="chip" data-topic="business">Business Wins</button>
        <button class="chip secondary" id="nextClip">Next Clip</button>
      </div>
    </div>
    <video id="reelVideo" class="reel-frame" controls autoplay muted playsinline></video>
    <div class="reel-foot">Internet Archive reel • tap a topic to switch • auto-rotates every 28 seconds</div>
  </div>

<script>
  (function(){
    var META_BASE = "https://archive.org/metadata/";
    var DL_BASE = "https://archive.org/download/";
    var video = document.getElementById("reelVideo");
    var statusEl = document.getElementById("reelStatus");
    var nextBtn = document.getElementById("nextClip");
    var topicButtons = Array.prototype.slice.call(document.querySelectorAll("[data-topic]"));
    var currentTopic = "hair";
    var autoTimer = null;
    var cache = {};

    var TOPIC_IDS = {
      hair: [
        "BodyCare1948",
        "HowtoBeW1949",
        "0589_Health_Your_Cleanliness_E01763_05_14_56_00",
        "4087_Cleanliness_And_Health"
      ],
      haircare: [
        "BodyCare1948",
        "HowtoBeW1949",
        "4087_Cleanliness_And_Health"
      ],
      millionaire: [
        "OfficeCo1952",
        "HabitPat1954",
        "Developing1951",
        "Everyday1948"
      ],
      business: [
        "OfficeCo1952",
        "HabitPat1954",
        "Developing1951",
        "Everyday1948"
      ]
    };

    function setStatus(msg){
      if(statusEl){ statusEl.textContent = msg; }
    }

    function pickRandom(list){
      if(!list || !list.length) return null;
      return list[Math.floor(Math.random() * list.length)];
    }

    function findVideoFile(files){
      if(!files) return null;
      for(var i=0;i<files.length;i++){
        var f = files[i];
        if(!f || !f.name) continue;
        var name = String(f.name).toLowerCase();
        var format = String(f.format || "").toLowerCase();
        if(name.endsWith(".mp4") || format.indexOf("mpeg4") !== -1){
          return f.name;
        }
      }
      return null;
    }

    function loadFromIdentifier(identifier){
      if(!identifier){
        setStatus("No archive clips found. Try another topic.");
        video.removeAttribute("src");
        return;
      }
      if(cache[identifier]){
        video.src = cache[identifier];
        setStatus("Now playing: " + identifier);
        return;
      }
      setStatus("Fetching archive metadata…");
      fetch(META_BASE + encodeURIComponent(identifier))
        .then(function(r){ return r.json(); })
        .then(function(data){
          var fileName = findVideoFile(data && data.files);
          if(!fileName){
            setStatus("No playable video found for " + identifier);
            return;
          }
          var url = DL_BASE + encodeURIComponent(identifier) + "/" + encodeURIComponent(fileName);
          cache[identifier] = url;
          video.src = url;
          setStatus("Now playing: " + identifier);
        })
        .catch(function(){
          setStatus("Archive fetch failed for " + identifier);
        });
    }

    function rotate(){
      var ids = TOPIC_IDS[currentTopic] || TOPIC_IDS.hair;
      var id = pickRandom(ids);
      loadFromIdentifier(id);
    }

    function ensureTopic(topic){
      currentTopic = topic;
      topicButtons.forEach(function(btn){
        btn.classList.toggle("active", btn.getAttribute("data-topic") === topic);
      });
      rotate();
    }

    function startAuto(){
      clearInterval(autoTimer);
      autoTimer = setInterval(rotate, 28000);
    }

    topicButtons.forEach(function(btn){
      btn.addEventListener("click", function(){
        var topic = btn.getAttribute("data-topic");
        ensureTopic(topic);
        startAuto();
      });
    });

    if(nextBtn){
      nextBtn.addEventListener("click", function(){
        rotate();
      });
    }

    ensureTopic(currentTopic);
    startAuto();
  })();
</script>
</body>
</html>
