<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Millionaire TV Reel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(1200px 600px at 20% 20%, rgba(116,224,184,0.25), transparent 60%),
      radial-gradient(900px 500px at 80% 30%, rgba(255,214,153,0.22), transparent 60%),
      linear-gradient(135deg, #0d1412 0%, #0b1a14 40%, #111c26 100%);
    color:#fff;
    font-family:'DM Sans', sans-serif;
  }
  .reel-wrap{
    width:min(980px, 92vw);
    display:grid;
    gap:14px;
  }
  .reel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 16px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.35);
  }
  .reel-title{
    font-size:18px;
    font-weight:700;
  }
  .reel-sub{
    font-size:12px;
    color:rgba(255,255,255,0.7);
  }
  .reel-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .chip{
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:#fff;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
  }
  .reel-frame{
    width:100%;
    height:62vh;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.16);
    background:#000;
  }
  .reel-foot{
    font-family:'Space Mono', monospace;
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.6);
    text-align:center;
  }
  @media (max-width:700px){
    .reel-frame{height:52vh;}
    .reel-head{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>
  <div class="reel-wrap">
    <div class="reel-head">
      <div>
        <div class="reel-title">AI Millionaire TV</div>
        <div class="reel-sub">Live YouTube reel · rotate topics to keep the feed fresh.</div>
      </div>
      <div class="reel-actions">
        <button class="chip" data-topic="AI making millionaires">AI Millionaires</button>
        <button class="chip" data-topic="best AI tools 2026">Best AI 2026</button>
        <button class="chip" data-topic="AI automation agency">AI Agency</button>
        <button class="chip" data-topic="Dan Martell AI business">Dan Martell</button>
        <button class="chip" data-topic="AI SaaS case study">AI SaaS</button>
      </div>
    </div>
    <iframe
      id="reelFrame"
      class="reel-frame"
      src="https://www.youtube.com/embed?listType=search&list=AI%20making%20millionaires"
      title="AI Millionaire Reel"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>
    <div class="reel-foot">Live reel • tap a topic to switch • stay consistent daily</div>
  </div>

<script>
  (function(){
    var frame = document.getElementById('reelFrame');
    document.querySelectorAll('[data-topic]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var topic = encodeURIComponent(btn.getAttribute('data-topic') || '');
        frame.src = 'https://www.youtube.com/embed?listType=search&list=' + topic;
      });
    });
  })();
</script>
</body>
</html>
