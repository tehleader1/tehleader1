<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SupportRD TV Reel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(1200px 600px at 20% 20%, rgba(116,224,184,0.25), transparent 60%),
      radial-gradient(900px 500px at 80% 30%, rgba(255,214,153,0.22), transparent 60%),
      linear-gradient(135deg, #0d1412 0%, #0b1a14 40%, #111c26 100%);
    color:#fff;
    font-family:'DM Sans', sans-serif;
  }
  .reel-wrap{
    width:min(980px, 92vw);
    display:grid;
    gap:14px;
  }
  .reel-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:14px 16px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.35);
  }
  .reel-title{
    font-size:18px;
    font-weight:700;
  }
  .reel-sub{
    font-size:12px;
    color:rgba(255,255,255,0.7);
  }
  .reel-actions{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .chip{
    padding:8px 12px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:#fff;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
  }
  .chip.active{
    background:linear-gradient(120deg, rgba(47,230,200,0.75), rgba(58,125,255,0.75));
    color:#0b0f14;
    border-color:transparent;
  }
  .chip.secondary{
    border-style:dashed;
    opacity:0.9;
  }
  .reel-frame{
    width:100%;
    height:62vh;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.16);
    background:#000;
  }
  .reel-foot{
    font-family:'Space Mono', monospace;
    font-size:10px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:rgba(255,255,255,0.6);
    text-align:center;
  }
  .reel-status{
    font-size:11px;
    color:rgba(255,255,255,0.65);
  }
  @media (max-width:700px){
    .reel-frame{height:52vh;}
    .reel-head{flex-direction:column;align-items:flex-start;}
  }
</style>
</head>
<body>
  <div class="reel-wrap">
    <div class="reel-head">
      <div>
        <div class="reel-title">SupportRD TV Reel</div>
        <div class="reel-sub">TikTok service stream · hair videos only.</div>
        <div class="reel-status" id="reelStatus">Loading TikTok hair feed…</div>
      </div>
      <div class="reel-actions">
        <button class="chip active" data-topic="hair">Hair Growth</button>
        <button class="chip" data-topic="haircare">Hair Care</button>
        <button class="chip" data-topic="curly">Curly Hair</button>
        <button class="chip" data-topic="scalp">Scalp Care</button>
        <button class="chip secondary" id="nextClip">Next Clip</button>
        <button class="chip secondary" id="openTiktok">Open in TikTok</button>
      </div>
    </div>
    <iframe id="reelFrame" class="reel-frame" title="TikTok Hair Reel" loading="lazy" allow="autoplay; encrypted-media"></iframe>
    <div class="reel-foot">TikTok hair reel • tap a topic to switch • auto-rotates every 10 seconds</div>
  </div>

<script>
  (function(){
    var frame = document.getElementById("reelFrame");
    var statusEl = document.getElementById("reelStatus");
    var nextBtn = document.getElementById("nextClip");
    var openBtn = document.getElementById("openTiktok");
    var topicButtons = Array.prototype.slice.call(document.querySelectorAll("[data-topic]"));
    var currentTopic = "hair";
    var autoTimer = null;
    var currentLink = "";
    var TOPIC_LINKS = {
      hair: [
        "https://www.tiktok.com/tag/hair",
        "https://www.tiktok.com/tag/hairtok",
        "https://www.tiktok.com/search?q=hair%20routine"
      ],
      haircare: [
        "https://www.tiktok.com/tag/haircare",
        "https://www.tiktok.com/search?q=hair%20care",
        "https://www.tiktok.com/search?q=healthy%20hair"
      ],
      curly: [
        "https://www.tiktok.com/tag/curlyhair",
        "https://www.tiktok.com/search?q=curly%20hair%20routine",
        "https://www.tiktok.com/search?q=curl%20definition"
      ],
      scalp: [
        "https://www.tiktok.com/search?q=scalp%20care",
        "https://www.tiktok.com/search?q=hair%20growth%20tips",
        "https://www.tiktok.com/search?q=scalp%20massage"
      ]
    };

    function setStatus(msg){
      if(statusEl){ statusEl.textContent = msg; }
    }

    function pickRandom(list){
      if(!list || !list.length) return null;
      return list[Math.floor(Math.random() * list.length)];
    }

    function rotate(){
      var links = TOPIC_LINKS[currentTopic] || TOPIC_LINKS.hair;
      var link = pickRandom(links);
      if(!link){
        setStatus("No TikTok links found for this topic.");
        return;
      }
      currentLink = link;
      frame.src = link;
      setStatus("Now showing TikTok " + currentTopic + " feed.");
    }

    function ensureTopic(topic){
      currentTopic = topic;
      topicButtons.forEach(function(btn){
        btn.classList.toggle("active", btn.getAttribute("data-topic") === topic);
      });
      rotate();
    }

    function startAuto(){
      clearInterval(autoTimer);
      autoTimer = setInterval(rotate, 10000);
    }

    topicButtons.forEach(function(btn){
      btn.addEventListener("click", function(){
        var topic = btn.getAttribute("data-topic");
        ensureTopic(topic);
        startAuto();
      });
    });

    if(nextBtn){
      nextBtn.addEventListener("click", function(){
        rotate();
      });
    }
    if(openBtn){
      openBtn.addEventListener("click", function(){
        if(currentLink){
          window.open(currentLink, "_blank", "noopener");
        }
      });
    }

    ensureTopic(currentTopic);
    startAuto();
  })();
</script>
</body>
</html>
