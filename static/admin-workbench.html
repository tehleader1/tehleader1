<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SupportRD Admin Workbench</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#111418;
      --panel:#1b2028;
      --border:#2f3745;
      --text:#e8edf7;
      --muted:#9fb0c7;
      --ok:#3ddc97;
      --accent:#7ec8ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"Outfit",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:radial-gradient(1000px 400px at 20% -10%, #223040 0%, transparent 60%), var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{max-width:1150px;margin:0 auto;padding:18px}
    .head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;
      background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:16px;
    }
    .title{font-size:1.35rem;font-weight:700}
    .sub{color:var(--muted);font-size:.95rem}
    .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-top:14px}
    .card{
      background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:14px;
    }
    .label{font-size:.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .value{font-size:1.05rem;font-weight:600;margin-top:4px}
    .ok{color:var(--ok)}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{
      border:1px solid #3d4758;background:#253040;color:var(--text);padding:9px 12px;border-radius:10px;
      text-decoration:none;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
    }
    .btn:hover{border-color:#5f7391}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid var(--border);text-align:left;padding:8px 6px;vertical-align:top}
    th{color:var(--muted);font-size:.83rem;text-transform:uppercase;letter-spacing:.06em}
    td{font-size:.92rem}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.82rem}
    .list{margin:8px 0 0;padding-left:18px}
    .pill{
      display:inline-block;background:#243040;border:1px solid #3a475a;color:var(--accent);
      border-radius:999px;padding:3px 8px;font-size:.75rem;margin-top:6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="head">
      <div>
        <div class="title">SupportRD Admin Workbench</div>
        <div class="sub">Real work behind SupportRD: emergency, refresh, logging, active CEO, competition, GPS, hair scan, and live safeguards.</div>
      </div>
      <div class="actions">
        <a class="btn" href="/">Back To App</a>
        <button class="btn" id="refreshNow">Refresh Now</button>
      </div>
    </section>

    <section class="row" id="systemCards"></section>

    <section class="row">
      <article class="card">
        <div class="label">SEO + Security</div>
        <div class="value" id="seoSecurity">Loading...</div>
      </article>
      <article class="card">
        <div class="label">As Of</div>
        <div class="value mono" id="asOf">Loading...</div>
      </article>
      <article class="card">
        <div class="label">Competition Live</div>
        <div class="value" id="competitionSummary">Loading...</div>
      </article>
    </section>

    <section class="row">
      <article class="card" style="grid-column:1/-1;">
        <div class="label">Bot Functions</div>
        <div id="botRows">Loading...</div>
      </article>
    </section>

    <section class="row">
      <article class="card" style="grid-column:1/-1;">
        <div class="label">Recent Logging</div>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Event</th>
              <th>Owner</th>
              <th>UUID</th>
            </tr>
          </thead>
          <tbody id="logRows"></tbody>
        </table>
      </article>
    </section>
  </div>

  <script>
    const byId = (id)=>document.getElementById(id);

    function escapeHtml(v){
      return String(v || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function renderCards(systems){
      const wrap = byId("systemCards");
      if(!wrap) return;
      wrap.innerHTML = (systems || []).map(s=>`
        <article class="card">
          <div class="label">${escapeHtml(s.label)}</div>
          <div class="value ok">${escapeHtml(s.status || "active")}</div>
          <div class="sub">${escapeHtml(s.detail || "")}</div>
        </article>
      `).join("");
    }

    function renderBots(bots){
      const el = byId("botRows");
      if(!el) return;
      el.innerHTML = (bots || []).map(b=>`
        <div style="margin-bottom:14px;">
          <div class="value">${escapeHtml((b.bot_id || "").toUpperCase())} <span class="pill">${escapeHtml(b.last_status || "idle")}</span></div>
          <div class="sub mono">${escapeHtml(b.last_run_at || "never")} · ${escapeHtml(b.last_summary || "")}</div>
          <ul class="list">${(b.functions || []).map(f=>`<li>${escapeHtml(f)}</li>`).join("")}</ul>
        </div>
      `).join("");
    }

    function renderLogs(rows){
      const el = byId("logRows");
      if(!el) return;
      if(!rows || !rows.length){
        el.innerHTML = `<tr><td colspan="4" class="mono">No recent logs.</td></tr>`;
        return;
      }
      el.innerHTML = rows.map(r=>`
        <tr>
          <td class="mono">${escapeHtml(r.created_at || "")}</td>
          <td>${escapeHtml(r.event_type || "")}</td>
          <td>${escapeHtml(r.owner_email || "")}</td>
          <td class="mono">${escapeHtml(r.application_uuid || "")}</td>
        </tr>
      `).join("");
    }

    async function loadOps(){
      try{
        const res = await fetch("/api/admin/ops-status", {cache:"no-store"});
        const data = await res.json();
        if(!(data && data.ok)){
          throw new Error((data && data.error) || "unauthorized");
        }
        renderCards(data.systems || []);
        renderBots(data.bots || []);
        renderLogs(data.recent_logs || []);
        const seo = data.seo || {};
        const sec = data.security || {};
        byId("seoSecurity").textContent = `SEO ${seo.enabled ? "ON" : "OFF"} · Jobs ${seo.jobs_scheduled || 0} · Money Guard ${sec.money_guard_enabled ? "ON" : "OFF"}`;
        byId("asOf").textContent = data.as_of || "";
        const comp = (data.systems || []).find(s=>String(s.key || "") === "competition");
        byId("competitionSummary").textContent = (comp && comp.detail) ? comp.detail : "No live summary";
      }catch(err){
        byId("systemCards").innerHTML = `<article class="card"><div class="value">Admin login required</div><div class="sub">Open main app and sign in with admin account.</div></article>`;
      }
    }

    byId("refreshNow").addEventListener("click", loadOps);
    loadOps();
    setInterval(loadOps, 12000);
  </script>
</body>
</html>
